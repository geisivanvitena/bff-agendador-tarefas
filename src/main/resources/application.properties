spring.application.name=bff-agendador-tarefas

usuario.url=http://usuario-api:8080/usuarios
tarefa.url=http://agendador-api:8081/tarefas
notificacao.url=http://notificacao-api:8082/email

server.port=8083

usuario.email=${USUARIO_EMAIL}
usuario.senha=${USUARIO_SENHA}

cron.horario=0 0/5 * * * ?

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true