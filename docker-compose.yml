services:

  postgres:
    image: postgres:latest
    container_name: postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: db_usuario
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:
      - "5432:5432"

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER}" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  mongo:
    image: mongo:latest
    container_name: mongo
    restart: unless-stopped

    ports:
      - "27017:27017"

    environment:
      MONGO_INITDB_DATABASE: db_agendador

    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval 'db.runCommand({ ping: 1 })'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  usuario-api:
    build: ../usuario-api
    container_name: usuario-api

    ports:
      - "${USUARIO_API_PORT}:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/db_usuario
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://usuario-api:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  agendador-api:
    build: ../agendador-api
    container_name: agendador-api

    ports:
      - "${AGENDADOR_API_PORT}:8081"

    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/db_agendador

    depends_on:
      mongo:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://agendador-api:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  notificacao-api:
    build: ../notificacao-api
    container_name: notificacao-api

    ports:
      - "${NOTIFICACAO_API_PORT}:8082"

    environment:
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://notificacao-api:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  bff-agendador-api:
    build: .
    container_name: bff-agendador-api

    ports:
      - "${BFF_API_PORT}:8083"

    env_file:
      - .env

    environment:
      USUARIO_API_URL: http://usuario-api:8080/usuarios
      AGENDADOR_API_URL: http://agendador-api:8081/tarefas
      NOTIFICACAO_API_URL: http://notificacao-api:8082/email

    depends_on:
      usuario-api:
        condition: service_healthy
      agendador-api:
        condition: service_healthy
      notificacao-api:
        condition: service_healthy


    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://bff-agendador-api:8083/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

networks:
  default:
    driver: bridge