services:

  postgres:
    image: postgres:latest
    container_name: postgres
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "5432:5432"

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

    networks:
      - microservices-network

  mongo:
    image: mongo:latest
    container_name: mongo
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "27017:27017"

    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval 'db.runCommand({ ping: 1 })'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

    networks:
      - microservices-network

  usuario-api:
    build: ../usuario-api
    container_name: usuario-api

    env_file:
      - .env

    ports:
      - "${USUARIO_API_PORT}:8080"

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://usuario-api:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

    networks:
      - microservices-network

  agendador-api:
    build: ../agendador-api
    container_name: agendador-api

    env_file:
      - .env

    ports:
      - "${AGENDADOR_API_PORT}:8081"

    depends_on:
      mongo:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://agendador-api:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

    networks:
      - microservices-network

  notificacao-api:
    build: ../notificacao-api
    container_name: notificacao-api

    env_file:
      - .env

    ports:
      - "${NOTIFICACAO_API_PORT}:8082"

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://notificacao-api:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

    networks:
      - microservices-network

  bff-agendador-api:
    build: .
    container_name: bff-agendador-api

    env_file:
      - .env

    ports:
      - "${BFF_API_PORT}:8083"

    depends_on:
      usuario-api:
        condition: service_healthy
      agendador-api:
        condition: service_healthy
      notificacao-api:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://bff-agendador-api:8083/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

    networks:
      - microservices-network

networks:
  microservices-network:
    driver: bridge